<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="CALC.css">
</head>
<body>
    <div class="calculator">
        <input type="text" class="calculator-screen" id = "display" value="" disabled />
        <div class="calculator-keys">
            <button type="button" class="operator" value="+" onclick= "checkOperator('+')">+</button>
            <button type="button" class="operator" value="-" onclick= "checkOperator('-')">-</button>
            <button type="button" class="operator" value="*" onclick= "checkOperator('*')">&times;</button>
            <button type="button" class="operator" value="/" onclick= "checkOperator('/')">&divide;</button>
            <button type="button" class="operator" value="**2" onclick= "power('**')">**x</button>
            <button type="button" class="operator" value="Log" onClick= "operateAdv('Log')">Log</button>
            <button type="button" class="operator" value="sqrt" onClick= "sqrt('sqrt')">√</button>
            <button type="button" class="operator" value="customsqrt" onClick= "customsqrt('sqrt')">x√</button>
            <button type="button" class="operator" value="(" onClick= "append('(')">(</button>
            <button type="button" class="operator" value=")" onClick= "append(')')">)</button>

            <button type="button" value="7" onclick = "getNumber('7')">7</button>
            <button type="button" value="8" onclick = "getNumber('8')">8</button>
            <button type="button" value="9" onclick = "getNumber('9')">9</button>

            <button type="button" value="4" onclick = "getNumber('4')">4</button>
            <button type="button" value="5" onclick = "getNumber('5')">5</button>
            <button type="button" value="6" onclick = "getNumber('6')">6</button>

            <button type="button" value="1" onclick = "getNumber('1')">1</button>
            <button type="button" value="2" onclick = "getNumber('2')">2</button>
            <button type="button" value="3" onclick = "getNumber('3')">3</button>

            <button type="button" value="0" onclick = "getNumber('0')">0</button>
            <button type="button"  onclick = "getNumber('.')"value=".">.</button>
            <button type="button"  value="phi" onclick="phi('phi')">Phi</button>
            <button type="button" class="all-clear" value="all-clear" onclick = "clearDisplay()">AC</button>

            <button type="button" class="equal-sign" value="=" onclick = "results('')">=</button>
        </div>
    </div>
    <script src="CALC.js"></script>
</body>
</html>
